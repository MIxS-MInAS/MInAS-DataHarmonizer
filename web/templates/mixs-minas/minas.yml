      catheter:
      clean catch:
  DamageTreatmentEnum:
    description: Options for types of molecular damage removal during library construction of ancient DNA libraries.
    permissible_values:
      no-removal:
        description: Molecular damage-derived misincorporations have not been removed using laboratory techniques.
      partial-removal:
        description: Molecular damage-derived misincorporations have been partially removed using laboratory techniques such as with an early stopped uracil-DNA glycosylase (UDG) or USER treatment, leaving a small number of nucleotides with damage at ends of molecules.
      complete-removal:
        description: Molecular damage-derived misincorporations have been entirely removed using laboratory techniques such as with complete uracil-DNA glycosylase (UDG) or USER treatment, leaving no nucleotides with damage at ends of molecules.
      damage-selection:
        description: Library preparation-derived technique that retain only molecules containing damage, and have discarded those without damage.
      other:
        description: Other types of damage treatment that are further described in other method description terms. If damage has been removed, but whether full or partial is unknown - use this option and describe known information in `sop_experimental` and related free text descriptive terms.
  LibTypeEnum:
    description: Options for types of DNA that have been targeted for DNA library construction.
    permissible_values:
      amplicon:
        description: A library that has been enriched for a single specific region of a genome (e.g. a specific gene) through targeted amplification.
      enriched:
        description: A library that has been enriched for DNA from typically large portions to the entirety of a genome, through array or in-solution 'capture' with genome array baits/probes.
      shotgun:
        description: An unselected library that has undergone no type of targeted amplification/enrichment for a particular genomic region or genome, i.e., random sequencing of any nucleic acid molecule contained in a genomic library.
  BioCulturalLabelEnum:
    description: "Options defining community expectations about the appropriate use of the sequencing data, as specified by the LocalContexts project (https://localcontexts.org/labels/biocultural-labels/)."
    permissible_values:
      "Biocultural Provenance Label (BC P):":
        description: "Biocultural Provenance Label (BC P) - This Label is being used to affirm an inherent interest Indigenous people have in the scientific collections and data about communities, peoples, and the biodiversity found within traditional lands, waters and territories (Full text https://localcontexts.org/label/bc-provenance/)."
      Biocultural Multiple Communities Label (BC MC):
        description: "Biocultural Multiple Communities Label (BC MC) - This Label is being used to affirm that responsibility and ownership over this information, collection, data, and digital sequence information (DSI) is spread across several distinct communities (Full text https://localcontexts.org/label/bc-multiple-communities/)."
      Biocultural Clan Label (BC CL):
        description: "Biocultural Clan Label (BC CL) - This Label is being used to indicate that this material is traditionally and usually not publicly available. The Label lets future users know that this data has specific conditions for use and sharing because of clan membership and/or relationships (Full text https://localcontexts.org/label/bc-clan/)."
      Biocultural Consent Verified Label (BC CV):
        description: "Biocultural Consent Verified Label (BC CV) - This Label is being used to verify that an associated community has consent conditions in place for the use of this information, collections, data, and digital sequence information. (Full text https://localcontexts.org/label/bc-consent-verified/)."
      Biocultural Consent Non-Verified Label (BC CNV):
        description: "Biocultural Consent Non-Verified Label (BC CNV) - This Label is being used because there are concerns about the accuracy of the consent and/or representations made for this data. This material was not created through informed consent or community protocols for research and engagement. (Full text https://localcontexts.org/label/bc-consent-non-verified/)."
      Biocultural Research Use Label (BC R):
        description: "Biocultural Research Use Label (BC R) - This Label is being used by an associated community to allow this information, collection, data, and digital sequence information (DSI) to be used for unspecified research purposes. This Label does not provide permission for commercialization activities. (Full text https://localcontexts.org/label/bc-research-use/)."
      Biocultural Open to Collaboration Label (BC CB):
        description: "Biocultural Open to Collaboration Label (BC CB) - This Label is being used to make clear an associated community is open to future engagement, collaboration, and partnership around research and outreach opportunities. (Full text https://localcontexts.org/label/bc-open-to-collaboration/)."
      Biocultural Open to Commercialisation Label (BC OC):
        description: "Biocultural Open to Commercialisation Label (BC OC) - This Label is being used to indicate that an associated community is open to commercialization opportunities that might derive from any information, collections, data, and digital sequence information (DSI) to which this Label is connected. (Full text https://localcontexts.org/label/bc-open-to-commercialization/)"
      Biocultural Outreach Label (BC O):
        description: "Biocultural Outreach Label (BC O) The Label is letting any users know that this data can be used for educational outreach activities. - (Full text https://localcontexts.org/label/bc-outreach/)."
      Biocultural Non-Commercial Label (BC NC):
        description: "Biocultural Non-Commercial Label (BC NC) - This Label is being used to indicate that these biocultural materials and/or data have been designated as being available for non-commercial use. (Full text https://localcontexts.org/label/bc-non-commercial/)."
  LibStrandEnum:
    description: Options for the strandedness of the input 'template' DNA molecules used for DNA library construction.
    permissible_values:
      single:
        description: Library constructed from single-stranded DNA molecules.
      double:
        description: Library constructed from double-stranded DNA molecules.
  ChronoAgeSysEnum:
    description: Options for specifying the chonometric age reference or timescale of a date.
    permissible_values:
      BCE:
        description: Before Common Era (before year 0 in the Christian calendar), equivalent to BC (before Christ).
      CE:
        description: Common Era (after year 0 in the Christian calendar), equivalent to AD (anno Domini, after Christ).
      BP:
        description: Before Present (~1950), known as 'Standard Year'.
      cal BP:
        description: Calibrated Before Present (~1950), known as 'Standard Year'.
      cal BCE:
        description: Calibrated Before Common Era (year 0 in the Christian calendar), equivalent to BC (before Christ).
      cal CE:
        description: Calibrated Common Era (~1950), equivalent to AD (anno Domini, after Christ).
      ka:
        description: kiloannum; thousands of years ago.
      Ma:
        description: megaannum; millions of years ago.
  ChronoAgeProtocolEnum:
    description: Options for methods to determine the age at time of death of an organism or the date of sample deposition.
    permissible_values:
      radiocarbon dating:
      optically stimulated infrared luminescence:
      amino acid racemisation:
      electron spin resonance:
      uranium thorium:
      age-depth modelling:
        description: Age-depth models are constructed based on limited numbers of dated depths (typically in sediment cores) to estimate the calendar ages. Different models are used based on assumptions about the sequence of deposit formation at each dated depth.
      contextual dating:
        description: A non-absolute date inferred from the specific context of an archaeological or palaeontological sample (e.g. stratigraphic layers, coins).
      associated absolute dating:
        description: Dates inferred from the absolute dates of associated materials within the same specific context of the sample (e.g. C14 dating of a animal bone artefact in the same context of a human burial).
      historical records:
      other:
  GeolEpochEnum:
    description: "Chronometric epochs defined by the International Chronostratigraphic Chart (v2024-12) of the International Commission on Stratigraphy (https://stratigraphy.org/chart/)."
