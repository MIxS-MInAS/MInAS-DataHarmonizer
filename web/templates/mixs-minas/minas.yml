    range: ChronoAgeProtocolEnum
    required: false
    recommended: true
  chrono_age_remarks:
    description: Notes or comments about the  earliest_chrono_age and latest_chrono_age. For more detail use Chronometric Age Protocol to point to original publication describing method. Useful to specify confidence and/or accuracy of reported date.
    title: chronometric age remarks
    examples:
    - value: radiocarbon dating, calibrated with OxCal v4.3 with 95% confidence interval
    - value: based on proxy dating from other bone samples of stratigraphic layer
    - value: a coin found in the burial was from the 3rd century was found in the mouth of the skeleton
    - value: age taken from previous publication Doe et al. 2019
    - value: "radiocarbon age ID: OxA-12345"
    in_subset:
    - nucleic acid sequence source
    slot_uri: "MIXS:999999927"
    close_mappings:
    - "chrono:chronometricAgeRemarks"
    multivalued: false
    range: string
    required: false
    recommended: true
  palaeopath_status:
    annotations:
      Expected_value: description of health related observation on ancient remains
    description: Describe briefly any relevant palaeopathological or health-related observations of the remains of the individual or subject under study.
    title: palaeopathology status
    examples:
    - value: Osteoporosis.
    - value: Parasites found in pelvic area.
    - value: Caries on right upper molar.
    in_subset:
    - environment
    keywords:
    - palaeopathology
    - host health
    - ancient
    slot_uri: "MIXS:999999928"
    multivalued: false
    range: string
    string_serialization: '{text}'
    required: false
    recommended: false
  batch_ids:
    annotations:
      Expected_value: list any batch_ids the sample, nucleic acids, or library was associated with during processing and sequencing
    description: "Identifiers for any form of batch or 'group' that the samples is associated with, examples including: individual/skeleton ID, sediment core IDs, extract batch, library batch, sequencing run etc..  These IDs should always act as 'umbrella' IDs that allow association with entries processed together, to allow for downstream analyses of batch effects. Ideally, the information should indicate or specify what type of batch the ID is describing."
    title: batch identifiers
    examples:
    - value: EXTB1;LIBB2;SeqRun1
    - value: "Extraction batch: 1"
    - value: 20260501-A2 (extraction);20202607-B2 (library)
    - value: ExtrMG;LibMG;SeqMG
    in_subset:
    - nucleic acid sequence source
    keywords:
    - identifiers
    slot_uri: "MIXS:999999929"
    multivalued: true
    range: string
    required: false
    recommended: false
  samp_category:
    description: The type/category of a sample. "Sample" includes biological and technical replicates.
    title: sample category
    examples:
    - value: sample
    - value: negative control
    - value: positive control
    keywords:
    - control
    in_subset:
    - nucleic acid sequence source
    slot_uri: "MIXS:999999930"
    range: SampCategoryEnum
    required: true
    recommended: true
  samp_decont_pretreat:
    description: Protocols employed for sample surface decontamination of external  modern nucleic acids; Treatment used on the samples immediately prior to nucleic acid extraction. Dependant on the sample type.  More relevant for bones than environmental samples. E.g. buffers, EDTA, etc.
    title: sample decontamination pretreatment
    examples:
    - value: "doi:10.1016/j.jas.2015.02.0181"
    in_subset:
    - nucleic acid sequence source
    slot_uri: "MIXS:999999931"
    multivalued: true
    range: string
    pattern: "^^PMID:\\d+$|^doi:10.\\d{2,9}/.*$|^https?:\\/\\/(?:www\\.)?[-a-zA-Z0-9@:%._\\+~#=]{1,256}\\.[a-zA-Z0-9()]{1,6}\\b(?:[-a-zA-Z0-9()@:%_\\+.~#?&\\/=]*)$$"
    structured_pattern:
      syntax: ^{PMID}|{DOI}|{URL}$
      interpolated: true
      partial_match: true
  damage_treatment:
    annotations:
      Expected_value: enumeration
    description: Indication of whether characteristic ancient DNA damage has been altered or removed from a DNA extract in a laboratory. If damage has been removed, but whether it was fully or partially removed is unknown (e.g. with UDG treatment) - specify 'other', and describe known information in `sop_experimental` and related free text descriptive terms.
    title: damage treatment type
    examples:
    - value: none
    - value: partial-removal
    in_subset:
    - sequencing
    keywords:
    - ancient
    slot_uri: "MIXS:999999932"
    multivalued: false
    range: DamageTreatmentEnum
    recommended: true
    required: true
  nucl_acid_extr_date:
    description: "The date when the nucleic acid extraction was started from the sample material. In case no exact time is available, the date can be right truncated i.e. all of these are valid times: 2008-01-23T19:23:10+00:00; 2008-01-23T19:23:10; 2008-01-23; 2008-01; 2008; Except: 2008-01; 2008 all are ISO8601 compliant"
    title: date of extraction of nucleic acids from sample
    examples:
    - value: '2023-12-01'
    in_subset:
    - nucleic acid sequence source
    slot_uri: "MIXS:999999933"
    range: datetime
    required: false
    recommended: false
  sop_experimental:
    description: Provide a DOI or URL to refer to the paper where the field report, nucleic acid extraction,  library construction, and other procedures are explained in more detail, e.g. the paper reporting the data.
    title: experimental standard operating procedure
    examples:
    - value: "doi:10.1093/nar/gkr771"
    in_subset:
    - nucleic acid sequence source
    slot_uri: "MIXS:999999934"
    multivalued: true
    range: string
    pattern: "^^PMID:\\d+$|^doi:10.\\d{2,9}/.*$|^https?:\\/\\/(?:www\\.)?[-a-zA-Z0-9@:%._\\+~#=]{1,256}\\.[a-zA-Z0-9()]{1,6}\\b(?:[-a-zA-Z0-9()@:%_\\+.~#?&\\/=]*)$$"
    structured_pattern:
      syntax: ^{PMID}|{DOI}|{URL}$
      interpolated: true
      partial_match: true
    required: false
    recommended: false
  lib_mid_desc:
    annotations:
      Expected_value: Description of the indexing configuration of the library
    description: Index/barcode/primer configuration used during library building for sequencing. This includes information such as the number, type and location of indexes, the index/primer kit/list, or if 'inline' barcodes or UMIs were ligated directly onto the template molecules.
    title: description of library multiplex identifiers or indexing configuration
    examples:
    - value: dual index with single internal barcode.
    - value: UDI index sequences.
    in_subset:
    - sequencing
    keywords:
    - library
    - preparation
    slot_uri: "MIXS:999999935"
    multivalued: true
    range: string
    string_serialization: '{text}'
    required: false
    recommended: true
  library_name:
    annotations:
      Expected_value: name of sequencing library
    description: Any ID or name used for referring to a nucleic acid sequencing library associated with the sample.
    title: library name
    examples:
    - value: JK1234
    - value: JFC001.A0101
    - value: A003-1-SG1
    in_subset:
    - sequencing
    keywords:
    - sequencing
    slot_uri: "MIXS:999999936"
    multivalued: true
    range: string
    required: false
    recommended: true
  lib_polymerase:
    annotations:
      Expected_value: name of polymerase used during library construction
    description: The polymerase enzyme used for building nucleic acid libraries. Include formal identifier e.g. SKU or the manufacturers name at minimum.
    title: library polymerase
    examples:
    - value: Agilent PfuTurbo Cx HotStart
    - value: KAPA HiFi HotStart
    - value: AmpliTaq Gold DNA Polymerase
    in_subset:
    - sequencing
    keywords:
    - polymerase
    - library
    - preparation
    string_serialization: '{text}'
    slot_uri: "MIXS:999999937"
    range: string
    required: false
    recommended: true
  lib_strandedness:
    annotations:
      Expected_value: nucleic acid library strandedness
    description: The strandedness of the original template nucleic acid molecules used for constructing the sequencing library
    title: nucleic acid strandedness in library creation
    examples:
    - value: single
    - value: double
    in_subset:
    - sequencing
    keywords:
    - library
    - preparation
    slot_uri: "MIXS:999999938"
    multivalued: true
    range: LibStrandEnum
    required: true
    recommended: true
  lib_gener_technique:
    description: The technique used to generate the library, i.e., amplicon, enriched, or shotgun. An amplicon library is a library that has been amplified to target a single specific region of a genome (e.g. a specific gene). An enriched library is a library that has had a particular genome or multiple genomic regions/positions 'captured' or enriched typically via baits/probes. A shotgun library has undergone no type of targeted amplification/enrichment for a particular genomic region or genome, i.e., random sequencing of any nucleic acid molecule contained in a genomic library.
    title: library generation technique
    examples:
    - value: shotgun
    - value: amplicon
    - value: enriched
    in_subset:
    - sequencing
    keywords:
    - library
    - preparation
    slot_uri: "MIXS:999999939"
    range: LibTypeEnum
    required: false
    recommended: true
  sop_lib_preparation:
    description: Citation(s) for the nucleic acid library preparation protocol.
    title: library preparation protocols
    examples:
    - value: "doi:10.1093/nar/gkr771"
    in_subset:
    - sequencing
    slot_uri: "MIXS:999999940"
    multivalued: true
    range: string
    pattern: "^^PMID:\\d+$|^doi:10.\\d{2,9}/.*$|^https?:\\/\\/(?:www\\.)?[-a-zA-Z0-9@:%._\\+~#=]{1,256}\\.[a-zA-Z0-9()]{1,6}\\b(?:[-a-zA-Z0-9()@:%_\\+.~#?&\\/=]*)$$"
    structured_pattern:
      syntax: ^{PMID}|{DOI}|{URL}$
      interpolated: true
      partial_match: true
    required: false
    recommended: false
  reamp_pcr_cyc_tot:
    description: Number of amplification cycles after library indexing PCR. If capture data, this refers to amplifications prior to the capture experiments.
    title: number of reamplification cycles
    examples:
    - value: '12'
    in_subset:
    - sequencing
    slot_uri: "MIXS:999999941"
    range: integer
  capt_pcr_cyc_tot:
    description: Amplification cycles after capture enrichment total. Provide additional information about PCR conditions in pcr_cond
    title: post capture PCR reamplication cycles total
    examples:
    - value: '12'
    in_subset:
    - sequencing
    slot_uri: "MIXS:999999942"
    range: integer
    multivalued: true
    required: false
    recommended: false
  capt_probe_src_taxid:
    annotations:
      Expected_value: Taxonomic IDs corresponding to organism(s) included in target enrichment (a.k.a. capture) probe design
    description: NCBI taxon ID(s) of all organisms included in the baits of a whole organelle or whole genome-level capture panel. There should be an (ideally) species level taxonomic ID entry for each organism that had sequences included in the design. If whole genera were targeted, you can instead use a single genus level taxonomic ID or that of any relevant higher taxonomic unit.
    title: Genomic capture probe source taxonomy IDs
    examples:
    - value: '9606'
    - value: '632'
    - value: '9789'
    in_subset:
    - sequencing
    keywords:
    - sequencing
    - library
    - enrichment
    - capture
    slot_uri: "MIXS:999999943"
    multivalued: true
    range: integer
    string_serialization:
    required: false
    recommended: false
  capt_probe_desc:
    annotations:
      Expected_value: Description of probe set used for target enrichment/library selection (a.k.a. capture)
    description: Description of target enrichment probe designs used (e.g., species included, sequences, type, company). This can include custom kits (please provide a general description and DOI if available) or commercially available kit (provide ID and company).
    title: capture probe design description
    examples:
    - value: Custom probe design (70 bp biotinylated RNA probes) covering 500 full E. Coli genomes; company TE-Science
    - value: Commercial RNA baits kit ABC001-EC from company TE-Science, purchased 2020
    in_subset:
    - sequencing
    keywords:
    - library
    - enrichment
    slot_uri: "MIXS:999999944"
    multivalued: true
    range: string
    string_serialization: '{text}'
    required: false
    recommended: false
  data_preproc_desc:
    annotations:
      Expected_value: description of any modifications to data away from original raw files
    description: Description of preprocessing performed on the reads in the sequencing data file. Describe any in silico processing or modification of the sequencing reads away from the original state as received from the sequencer. This should include details such as adapter-, barcode-, and/or quality- trimming, or any filtering such as for read length or of off-target reads.
    title: description of sequencing reads preprocessing
    examples:
    - value: Adapter trimmed, quality filtered, and host reads removed through mapping for ethical reasons.
    - value: Adapters removed by Trimmomatic (v0.39), and off-target reads removed after mapping to the HG19 Human reference with bwa aln (v0.7.19).
    - value: Demultiplexed with bcl2fastq, inline barcodes removed, and reads quality filtered with fastp (v1.0.0).
    in_subset:
    - sequencing
    keywords:
    - data analysis
    - data
    slot_uri: "MIXS:999999945"
    multivalued: false
    range: string
    required: false
    recommended: true
  reads_removed_desc:
    annotations:
      Expected_value: Whether any sequencing reads were removed from the data files after sequencing
    description: Specify whether associated data was filtered in some form prior to upload, such as host reads removal. Detailed description of the the data filtering that was carried out should be described in term 'preprocessing of sequencing reads description'.
    title: description of reads removal
    examples:
    - value: 'no'
    - value: 'yes'
    in_subset:
    - sequencing
    keywords:
    - data analysis
    slot_uri: "MIXS:999999946"
    multivalued: false
    range: boolean
    required: false
    recommended: true
